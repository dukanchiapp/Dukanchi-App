<!doctype html>
<!-- Session 128.13 — Bright Skin: data-theme="yellow" activates the yellow
     palette block in src/bright-skin.css (overrides the orange defaults). -->
<html lang="en" translate="no" data-theme="yellow">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dukanchi - Apki local market ab aapke phone par.</title>

    <!-- Bright skin fonts — Inter (UI) + JetBrains Mono (prices). CSP allows
         fonts.googleapis.com (style-src) + fonts.gstatic.com (font-src). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Session 128.18 — theme-color updated to the TOP-LEFT corner of the
         yellow gradient (#FFD63B) so the OS status bar (Android Chrome /
         iOS Safari) reads as a continuation of the visible header band.
         Founder feedback: "the status bar should match the color of
         header." Previously was #FFB300 (the gradient end-stop), which on
         devices showed a visible orange-to-yellow seam at the top edge. -->
    <meta name="theme-color" content="#FFD63B" />

    <!-- Session 128.9 — 3D yellow favicon (SVG, infinite resolution). Modern
         browsers prefer this over the PNG fallback. PNGs remain in the
         manifest for legacy installers + Android home-screen. -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="alternate icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="mask-icon" href="/icons/icon.svg" color="#F8CB46" />

    <!-- Apple / iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Dukanchi" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / social -->
    <meta name="description" content="Apne local market me koi bhi product search karein. Hum local retailers ko customers se connect kar rahe hain. Aap jahan bhi jayein, uss area ki local market ab aapke phone par hogi. Local products shop karein, local stores search karein aur chat ke through directly connect karein." />
    <meta name="keywords" content="Dukanchi, local market, local stores, shop local, apna bazaar, apni dukaan, online local shopping, stores near me" />
    <link rel="canonical" href="https://dukanchi.com/" />
    
    <!-- Geo Meta Tags for Hyperlocal SEO (God Tier) -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="geo.position" content="20.593684;78.96288" />
    <meta name="ICBM" content="20.593684, 78.96288" />
    <!-- Session 128.11 — Open Graph (Facebook, WhatsApp, LinkedIn link previews).
         WhatsApp + Instagram are the big retailer-onboarding channels for the
         founder; nice-looking previews lift the share→install funnel. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dukanchi" />
    <meta property="og:url" content="https://dukanchi.com/" />
    <meta property="og:title" content="Dukanchi - Apki local market ab aapke phone par." />
    <meta property="og:description" content="Apne local market me koi bhi product search karein. Hum local retailers ko customers se connect kar rahe hain. Aap jahan bhi jayein, uss area ki local market ab aapke phone par hogi. Local products shop karein, local stores search karein aur chat ke through directly connect karein." />
    <meta property="og:image" content="https://dukanchi.com/icons/icon-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="hi_IN" />

    <!-- Twitter / X large-image card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dukanchi - Apki local market ab aapke phone par." />
    <meta name="twitter:description" content="Apne local market me koi bhi product search karein. Hum local retailers ko customers se connect kar rahe hain. Aap jahan bhi jayein, uss area ki local market ab aapke phone par hogi. Local products shop karein, local stores search karein aur chat ke through directly connect karein." />
    <meta name="twitter:image" content="https://dukanchi.com/icons/icon-512x512.png" />

    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Dukanchi",
      "url": "https://dukanchi.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://dukanchi.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Pre-React browser guard: redirect to /landing before React loads — zero flash -->
    <script>
      (function() {
        // Capacitor native app: skip all PWA/landing redirect logic
        if (window.Capacitor && window.Capacitor.isNativePlatform &&
            window.Capacitor.isNativePlatform()) {
          return;
        }

        var path = window.location.pathname;

        var browserMode = false;
        try { browserMode = localStorage.getItem('dk-browser-mode') === '1'; } catch(e) {}

        var matchStandalone =
          window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true ||
          document.referrer.indexOf('android-app://') === 0;

        var stickyFlag = false;
        try { stickyFlag = sessionStorage.getItem('dk-pwa') === '1'; } catch(e) {}

        if (matchStandalone) {
          try { sessionStorage.setItem('dk-pwa', '1'); } catch(e) {}
        }

        var isStandalone = matchStandalone || stickyFlag;

        // PWA accidentally on /landing → bounce to app root
        if (isStandalone && path === '/landing') {
          window.location.replace('/');
          return;
        }

        // Browser-mode user on /landing → bounce to app root
        if (browserMode && path === '/landing') {
          window.location.replace('/');
          return;
        }

        // Browser user (not browser-mode) on app routes → go to landing.
        // /legal/* is exempt: DPDP legal docs must be publicly reachable
        // before signup. Keep this prefix in sync with
        // src/constants/publicRoutes.ts (a static script cannot import it).
        if (!isStandalone && !browserMode && path !== '/landing' &&
            path.indexOf('/legal/') !== 0) {
          window.location.replace('/landing');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
