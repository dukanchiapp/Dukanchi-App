<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dukanchi — Apna Bazaar, Apni Dukaan</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B35" />

    <!-- Apple / iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Dukanchi" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / social -->
    <meta name="description" content="Ab aapki local market aapke phone par. Local stores se seedha connect karo." />

    <!-- Pre-React browser guard: redirect to /landing before React loads — zero flash -->
    <script>
      (function() {
        var path = window.location.pathname;
        var search = window.location.search;

        var isStandaloneNow =
          window.matchMedia('(display-mode: standalone)').matches ||
          window.matchMedia('(display-mode: minimal-ui)').matches ||
          window.matchMedia('(display-mode: fullscreen)').matches ||
          window.navigator.standalone === true ||
          document.referrer.indexOf('android-app://') === 0;

        var hasSourcePwa = search.indexOf('source=pwa') !== -1;

        var sessionFlag = false;
        try {
          sessionFlag = sessionStorage.getItem('dk-is-pwa') === '1';
        } catch (e) {}

        var isPWA = isStandaloneNow || hasSourcePwa || sessionFlag;

        if (isPWA) {
          try { sessionStorage.setItem('dk-is-pwa', '1'); } catch (e) {}
        }

        // PWA on /landing → force to app root (stale start_url recovery)
        if (isPWA && path === '/landing') {
          window.location.replace('/');
          return;
        }

        // Browser on app routes → go to landing
        if (!isPWA && path !== '/landing') {
          window.location.replace('/landing');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
