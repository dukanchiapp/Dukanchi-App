<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dukanchi — Apna Bazaar, Apni Dukaan</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B35" />

    <!-- Apple / iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Dukanchi" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / social -->
    <meta name="description" content="Ab aapki local market aapke phone par. Local stores se seedha connect karo." />

    <!-- Pre-React browser guard: redirect to /landing before React loads — zero flash -->
    <script>
      (function() {
        // Capacitor native app: skip all PWA/landing redirect logic
        if (window.Capacitor && window.Capacitor.isNativePlatform &&
            window.Capacitor.isNativePlatform()) {
          return;
        }

        var path = window.location.pathname;

        var browserMode = false;
        try { browserMode = localStorage.getItem('dk-browser-mode') === '1'; } catch(e) {}

        var matchStandalone =
          window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true ||
          document.referrer.indexOf('android-app://') === 0;

        var stickyFlag = false;
        try { stickyFlag = sessionStorage.getItem('dk-pwa') === '1'; } catch(e) {}

        if (matchStandalone) {
          try { sessionStorage.setItem('dk-pwa', '1'); } catch(e) {}
        }

        var isStandalone = matchStandalone || stickyFlag;

        // PWA accidentally on /landing → bounce to app root
        if (isStandalone && path === '/landing') {
          window.location.replace('/');
          return;
        }

        // Browser-mode user on /landing → bounce to app root
        if (browserMode && path === '/landing') {
          window.location.replace('/');
          return;
        }

        // Browser user (not browser-mode) on app routes → go to landing
        if (!isStandalone && !browserMode && path !== '/landing') {
          window.location.replace('/landing');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
