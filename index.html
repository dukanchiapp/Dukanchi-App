<!doctype html>
<html lang="hi-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dukanchi — Apna Bazaar, Apni Dukaan</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B35" />

    <!-- Apple / iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Dukanchi" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / social -->
    <meta name="description" content="Ab aapki local market aapke phone par. Local stores se seedha connect karo." />

    <!-- Pre-React browser guard: redirect to /landing before React loads — zero flash -->
    <script>
      (function() {
        var isStandalone =
          window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true;
        var path = window.location.pathname;
        if (!isStandalone && path !== '/landing') {
          window.location.replace('/landing');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
