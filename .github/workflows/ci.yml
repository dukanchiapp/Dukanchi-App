# Dukanchi CI — Day 6 / Session 93 / Phase 1 + 3
#
# Phase 1 closes ND-D6-1 (no CI/CD) and the verification protocol gap surfaced
# by Day 5.1 (4-then-6 strict typecheck errors hid for 2 sprint days because
# manual verification used the wrong tsc invocation).
#
# Phase 3 (this update):
#   - ND-D6-4: vitest coverage via @vitest/coverage-v8 + Codecov upload
#   - ND-D6-5: bundle size PR comments via preactjs/compressed-size-action
#     (report-only, no fail-on-budget gate per Q-D6-5)
#
# Triggers:
#   - Every PR (any target branch) — gate before merge
#   - Push to main — catches direct commits + post-merge regression
# Skips: feature-branch pushes (Q-D6-6 — save Actions minutes)
#
# Jobs:
#   ci          — Typecheck + tests (with coverage) + build + Codecov upload
#   bundle-size — PR-only; reports gzipped bundle delta vs base via PR comment
#
# Hard gates (any non-zero exit aborts the `ci` job + blocks merge if branch
# protection is configured):
#   1. npm ci             — clean dependency install (reproducible)
#   2. npm run typecheck  — Rule G (runs typecheck:web + typecheck:server)
#   3. npm run test:coverage — vitest run + v8 coverage (42/42 + thresholds)
#   4. npm run build      — full prod build (catches vite/PWA issues)
#   5. Codecov upload     — non-blocking (fail_ci_if_error: false)
#
# `bundle-size` job is informational only (Q-D6-5) — it never blocks merge.
#
# Required branch protection rules (USER MANUAL ACTION per Q-D6-6):
#   - main: require PR (no direct push)
#   - main: required check = "ci" (NOT "bundle-size" — that's report-only)
#   - main: no force-push

name: ci

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]

# Cancel in-progress runs when a new commit pushes to the same ref —
# saves Actions minutes when devs push rapid corrections.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (Rule G — both web + server projects)
        run: npm run typecheck

      - name: Lint (report-only — Day 7 Phase 3 / ND-D7-3 + ND-D7-4)
        # Q-D7-4 approved: report-only initially. CI never fails on lint
        # warnings — but the logs surface them so the Day 8+ cleanup
        # sweep has a published baseline to track against. Promote to
        # hard-gate after the baseline (448 problems / Session 94) is
        # cleared. See README "Code Style" section.
        run: npm run lint
        continue-on-error: true

      - name: Format check (report-only — Day 7 Phase 3 / ND-D7-4)
        # Same Q-D7-4 stance as lint. 174 files pending format at Session
        # 94 baseline; Day 8+ sweep will run `npm run format:fix` as a
        # single atomic commit.
        run: npm run format
        continue-on-error: true

      - name: Run tests with coverage (v8 provider)
        # Day 6 Phase 3 / ND-D6-4: produces ./coverage/lcov.info for Codecov.
        # Thresholds (statements/branches/functions/lines) live in vitest.config.ts
        # — baseline-driven floor, see Q-D6-1 + that config's comment block.
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        # Day 6 Phase 3 / Q-D6-8: public-repo tokenless upload.
        # fail_ci_if_error: false — coverage is informational. A Codecov outage
        # or 5xx must not block the hard-gate `ci` job.
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Build (full production bundle)
        # Build last because typecheck + test failures are cheaper signals.
        # If this fails, the deploy would also fail — catch it in CI.
        #
        # Day 6 Phase 5 / ND-D6-3: forward Sentry source-map upload secrets
        # when present. vite.config.ts gates the plugin behind
        # !!(SENTRY_AUTH_TOKEN && SENTRY_ORG && SENTRY_PROJECT) — if any are
        # absent (GitHub passes empty string for unset secrets), the plugin
        # is omitted entirely and the build proceeds with a graceful warning.
        # See RUNBOOK §9 for provisioning instructions.
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npm run build

  bundle-size:
    name: Bundle Size Report (informational)
    # Day 6 Phase 3 / ND-D6-5 / Q-D6-5: report-only PR comment.
    # PR-only — the action needs base+head to compute a delta.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write  # post PR comment
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Report compressed bundle size delta
        uses: preactjs/compressed-size-action@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # `npm run build` runs typecheck + build:web — same as CI gate above.
          build-script: 'build'
          # Vite outputs hashed filenames into dist/assets/ for both JS and CSS.
          pattern: 'dist/**/*.{js,css,html}'
          # Strip 8-char Vite hash so renamed-but-unchanged files don't show
          # as "new + deleted" in the PR comment.
          strip-hash: '\\b[a-f0-9]{8}\\.'
