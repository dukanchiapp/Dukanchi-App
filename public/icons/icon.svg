<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Session 128.13 — Dukanchi Bright Skin app icon.
    Per dukanchi-bright-skin/ICONS.md:
      • Tile: linear-gradient(135deg, #FFD63B, #FFB300) at radius ~22% of size
      • Glyph: Devanagari "द", color #1C1A18 (dark on yellow), Sora 600
      • Centered at ~52% of tile height
    Flat per the Bright Skin spec — no specular sheen, no inner shadow, no
    bevel. The brand mark stays clean so it reads at 16/32/180/512px sizes.
  -->
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFD63B"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#face)"/>
  <text x="256" y="266"
        font-family="Sora, Inter, sans-serif"
        font-weight="600"
        font-size="320"
        fill="#1C1A18"
        text-anchor="middle"
        dominant-baseline="central">द</text>
</svg>
