# Dukanchi production — Fly.io Mumbai (bom1).
# Migrated from Railway US during the May 2026 soft-launch prep.
# Database stays on Neon Singapore (no DB migration). Redis: Railway today,
# Upstash in Phase 3.

app = "dukanchi-app"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"
  # Session 128.19: VITE_* build args. `.env` is gitignored + dockerignored
  # so Vite would inline an empty string for these public keys at build
  # time, which is why the Map page sat on "Loading map…" — `useJsApiLoader`
  # silently fell through with no key. Fly passes these as `--build-arg` to
  # match the `ARG` in Dockerfile. The Google Maps key is HTTP-referrer-
  # restricted in the GCP console (dukanchi.com, *.fly.dev, localhost), so
  # committing the value is safe — it would otherwise ship in the public JS.
  [build.args]
    VITE_GOOGLE_MAPS_API_KEY = "AIzaSyD2O2M-yE-PmOMZcOo_flnaSFXMzsp2qVk"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
