# Dukanchi production — Fly.io Mumbai (bom1).
# Migrated from Railway US during the May 2026 soft-launch prep.
# Database stays on Neon Singapore (no DB migration). Redis: Railway today,
# Upstash in Phase 3.

app = "dukanchi-app"
primary_region = "bom1"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
